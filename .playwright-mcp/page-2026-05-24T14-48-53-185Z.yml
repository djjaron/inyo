                - heading "About" [level=3] [ref=e7371]
                - generic [ref=e7372]: The Legal Review Agent performs AI-powered legal spotting on any document uploaded to your Inyo vault — NDAs, LPAs, SAFEs, subscription agreements, co-investment side letters, real estate contracts, and more. **What it flags:** - Unusual or non-standard terms - Hidden obligations and triggers - Auto-renewal and evergreen clauses - Indemnity and liability language - Governance and control provisions - Missing standard protections - Favorable terms worth highlighting - Expiry dates and key deadlines **Output includes:** - Document type classification - Flagged clauses with severity (high / medium / low) - Plain-English explanation of each flag - Recommended action per flag - Overall urgency rating - Structured JSON ready for review workflows **Disclaimer:** This is legal spotting only, not legal advice. Always consult qualified counsel on material decisions. Powered by Claude Opus 4-7 via the Inyo agent runtime.
