                - heading "About" [level=3] [ref=e6435]
                - generic [ref=e6436]: The Relationship Intelligence agent turns a family office's contact network into a searchable, queryable asset. **What it answers:** - "Who introduced us to this founder?" — traces introduction chains - "When did we last speak with [contact]?" — surfaces last contact date and interaction history - "Who is our warmest path to [target]?" — finds multi-hop connection paths - "Which LPs or co-investors focus on climate?" — filters by investment thesis - "What open commitments do we have with [contact]?" — tracks follow-ups **Output includes:** - Answered query with supporting evidence - Relevant contact profiles with interaction history - Connection path maps (A → B → C) - Open items and follow-up suggestions - Relationship strength signals Powered by Claude Opus 4-7 via the Inyo agent runtime.
