                - heading "About" [level=3] [ref=e2801]
                - generic [ref=e2802]: "The Deal Flow Analyst is a specialized AI agent built into the Inyo Family Office OS. It automatically evaluates inbound investment opportunities and returns a structured deal score (0–100) across four dimensions: market size (25%), team quality (25%), traction (25%), and deal terms (25%). **What it does:** - Summarizes the opportunity in 2–3 sentences - Identifies sector, stage, capital ask, and valuation - Estimates TAM and extracts key metrics (ARR, burn, runway) - Assesses founder background and comparables - Flags 3–5 risks and 3–5 upside opportunities - Returns a recommendation: pass / review / pursue **Built for family offices** managing proprietary deal flow, direct investments, and co-investment opportunities across venture, growth equity, private equity, and real estate. Powered by Claude Opus 4 via the Inyo agent runtime."
