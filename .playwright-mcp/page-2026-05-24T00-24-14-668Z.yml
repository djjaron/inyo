              - generic [ref=e9233]:
                - heading "About" [level=3] [ref=e9234]
                - generic [ref=e9235]: "The Diligence Analyst runs a structured due diligence checklist against any deal in the Inyo pipeline and returns findings for each item — instantly surfacing what's verified, what's missing, and what's a red flag. **How it works:** 1. Provide a deal context (company, financials, founders, documents) 2. Optionally provide a custom checklist or use Inyo's built-in templates 3. Agent reviews each checklist item against available data 4. Returns per-item status: complete / flagged / pending **Built-in checklist categories:** - Team & founders (background, track record, references) - Market & competition (TAM, moat, competitive dynamics) - Financials (ARR, burn, cap table, unit economics) - Product & technology (tech stack, IP, roadmap) - Legal & compliance (incorporation, contracts, IP ownership) - References & customers (NPS, churn, case studies) **Output:** Per-item findings + overall diligence summary + red flags + passing items. Powered by Claude Opus 4-7 via the Inyo agent runtime."
